<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>MVEXPRESS Payslip</title>

<style>

body{
font-family:Arial;
background:#0f172a;
margin:0;
padding:30px;
color:white;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:white;
color:black;
padding:40px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
margin:0;
color:#2563eb;
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:30px;
}

.label{
font-weight:bold;
color:#64748b;
font-size:13px;
}

.value{
font-size:18px;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.salary-box{
margin-top:25px;
padding:20px;
background:#f1f5f9;
border-radius:8px;
}

.final{
font-size:22px;
font-weight:bold;
color:#16a34a;
}

.controls{
margin-bottom:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

select,input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
background:#2563eb;
color:white;
}

.print{
background:#16a34a;
}

</style>

</head>

<body>

<div class="container">

<div class="controls">

<select id="staffSelect"></select>

<input type="month" id="monthSelect">

<button onclick="loadPayslip()">Load</button>

<button class="print" onclick="printSlip()">Print</button>

</div>

<div class="card" id="slip">

<div class="top">

<div>
<h1>MVEXPRESS</h1>
<div>Salary Payslip</div>
</div>

<div>
<div class="label">Month</div>
<div class="value" id="month"></div>
</div>

</div>

<div class="grid">

<div>
<div class="label">Staff Name</div>
<div class="value" id="name"></div>

<div class="label">Role</div>
<div class="value" id="role"></div>

<div class="label">Hourly Rate</div>
<div class="value" id="rate"></div>
</div>

<div>
<div class="label">Worked Time</div>
<div class="value" id="hours"></div>

<div class="label">Base Salary</div>
<div class="value" id="base"></div>

<div class="label">Paid Status</div>
<div class="value" id="status"></div>
</div>

</div>

<div class="salary-box">

<div>Bonus: ₹ <span id="bonus"></span></div>
<div>Deduction: ₹ <span id="deduction"></span></div>

<hr>

<div class="final">
Final Salary: ₹ <span id="final"></span>
</div>

</div>

</div>

</div>

<script>

async function loadStaff(){

const res = await fetch("/api/staff")
const data = await res.json()

let html=""

data.staff.forEach(s=>{

html+=`<option value="${s.id}">
${s.name}
</option>`

})

document.getElementById("staffSelect").innerHTML=html

}

async function loadPayslip(){

const id=document.getElementById("staffSelect").value
const month=document.getElementById("monthSelect").value

const res=await fetch(`/api/payroll?month=${month}`)
const data=await res.json()

const p=data.payroll.find(x=>x.staff_id==id)

if(!p) return alert("no payroll")

document.getElementById("month").innerText=month
document.getElementById("name").innerText=p.name
document.getElementById("role").innerText=p.role
document.getElementById("rate").innerText="₹ "+p.hourly_rate
document.getElementById("hours").innerText=p.total_worked_time_text
document.getElementById("base").innerText="₹ "+p.base_salary
document.getElementById("bonus").innerText=p.bonus
document.getElementById("deduction").innerText=p.deduction
document.getElementById("final").innerText=p.final_salary
document.getElementById("status").innerText=p.paid_status

}

function printSlip(){

window.print()

}

loadStaff()

</script>

</body>

</html>
